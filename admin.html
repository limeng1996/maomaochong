<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>咖啡车商家后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FAFAF9; color: #1C1917; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased max-w-md mx-auto min-h-screen relative bg-stone-50 shadow-2xl overflow-hidden">
    <div id="app" class="h-screen overflow-y-auto pb-6 hide-scrollbar">

        <!-- 连接状态 -->
        <div id="conn-status" class="fixed top-0 left-0 right-0 z-50 text-center text-xs py-1 bg-stone-200 text-stone-500 transition-all">正在连接...</div>

        <!-- 顶部 -->
        <div class="bg-white px-6 pt-12 pb-4 sticky top-0 z-20 border-b border-stone-100">
            <h1 class="text-2xl font-bold text-stone-800 mb-4">商家后台</h1>
            <div class="flex bg-stone-100 rounded-xl p-1">
                <button onclick="switchTab('orders')" id="tab-orders" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white text-stone-800 shadow-sm transition-all">订单管理</button>
                <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-2 text-sm font-medium rounded-lg text-stone-500 transition-all">店铺设置</button>
            </div>
        </div>

        <!-- 订单页 -->
        <div id="panel-orders" class="px-4 py-6 space-y-4 fade-in">
            <div id="orders-status" class="bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-800">
                <p class="font-medium">实时同步中</p>
                <p class="text-xs mt-1">顾客下单后将自动出现在下方</p>
            </div>
            <div id="pending-list" class="space-y-3">
                <div class="text-center py-20 text-stone-400">
                    <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">☕</div>
                    <p>暂无待制作订单</p>
                </div>
            </div>
        </div>

        <!-- 设置页 -->
        <div id="panel-settings" class="hidden px-4 py-6 space-y-4 fade-in">
            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="font-bold text-stone-800">店铺信息</h3>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">店铺名称</label>
                    <input type="text" id="s-name" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-stone-200 focus:outline-none focus:border-stone-400 text-stone-800">
                </div>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">店铺公告</label>
                    <input type="text" id="s-notice" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-stone-200 focus:outline-none focus:border-stone-400 text-stone-800">
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="font-bold text-stone-800">收款码</h3>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">微信收款码</label>
                    <div class="flex items-center gap-3">
                        <div class="w-20 h-20 bg-stone-100 rounded-lg flex items-center justify-center overflow-hidden" id="p-wechat"><span class="text-xs text-stone-400">未上传</span></div>
                        <label class="flex-1 px-4 py-3 bg-stone-800 text-white rounded-xl text-center text-sm font-medium cursor-pointer active:scale-[0.98] transition-transform">
                            上传微信收款码<input type="file" accept="image/*" class="hidden" onchange="upQrcode(this,'wechat')">
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">支付宝收款码</label>
                    <div class="flex items-center gap-3">
                        <div class="w-20 h-20 bg-stone-100 rounded-lg flex items-center justify-center overflow-hidden" id="p-alipay"><span class="text-xs text-stone-400">未上传</span></div>
                        <label class="flex-1 px-4 py-3 bg-stone-800 text-white rounded-xl text-center text-sm font-medium cursor-pointer active:scale-[0.98] transition-transform">
                            上传支付宝收款码<input type="file" accept="image/*" class="hidden" onchange="upQrcode(this,'alipay')">
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="font-bold text-stone-800">车上点单二维码</h3>
                <p class="text-xs text-stone-500">打印此二维码贴在车上，顾客扫码进入点单页面</p>
                <input type="text" id="s-url" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-stone-200 text-stone-800 text-sm mb-3" placeholder="顾客端链接，如 https://xxx.github.io/maomaochong/index.html">
                <button onclick="genCarQr()" class="w-full py-3 bg-stone-800 text-white rounded-xl text-sm font-medium active:scale-[0.98] transition-transform">生成车上二维码</button>
                <div id="car-qr-wrap" class="hidden pt-4 border-t border-stone-100 flex flex-col items-center">
                    <div id="car-qrcode" class="mb-3"></div>
                    <p class="text-xs text-stone-500">截图保存，建议打印 10×10cm</p>
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-medium text-lg active:scale-[0.98] transition-transform">保存并广播设置</button>
        </div>
    </div>

    <script>
        // ==================== 配置：必须与顾客端完全一致 ====================
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const TOPIC_PREFIX = 'coffee/limeng1996/maomaochong'; // 必须与顾客端一致
        // ================================================================

        let mqttClient = null;
        let pendingOrders = [];
        let configData = { shopName: '', shopNotice: '', wechatQrcode: '', alipayQrcode: '' };

        function initMqtt() {
            const statusEl = document.getElementById('conn-status');
            mqttClient = mqtt.connect(MQTT_BROKER, {
                clientId: 'coffee_a_' + Math.random().toString(36).substr(2, 8),
                clean: true, connectTimeout: 5000, reconnectPeriod: 3000
            });

            mqttClient.on('connect', () => {
                statusEl.textContent = '已连接';
                statusEl.className = 'fixed top-0 left-0 right-0 z-50 text-center text-xs py-1 bg-green-100 text-green-700 transition-all';
                mqttClient.subscribe(TOPIC_PREFIX + '/orders');
                setTimeout(() => statusEl.style.opacity = '0', 2000);
            });

            mqttClient.on('message', (topic, message) => {
                try {
                    if (topic === TOPIC_PREFIX + '/orders') {
                        const order = JSON.parse(message.toString());
                        if (!pendingOrders.find(o => o.timestamp === order.timestamp && o.num === order.num)) {
                            pendingOrders.unshift(order);
                            savePending();
                            renderPending();
                            // 提示音
                            try {
                                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.connect(gain); gain.connect(ctx.destination);
                                osc.frequency.value = 880; gain.gain.value = 0.1;
                                osc.start(); osc.stop(ctx.currentTime + 0.15);
                                setTimeout(() => {
                                    const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
                                    osc2.connect(gain2); gain2.connect(ctx.destination);
                                    osc2.frequency.value = 1100; gain2.gain.value = 0.1;
                                    osc2.start(); osc2.stop(ctx.currentTime + 0.15);
                                }, 150);
                            } catch(e) {}
                        }
                    }
                } catch (e) {}
            });

            mqttClient.on('error', () => {
                statusEl.textContent = '连接失败，正在重试...';
                statusEl.className = 'fixed top-0 left-0 right-0 z-50 text-center text-xs py-1 bg-red-100 text-red-700 transition-all';
            });
        }

        function savePending() { localStorage.setItem('coffee_pending', JSON.stringify(pendingOrders)); }

        function switchTab(tab) {
            document.getElementById('tab-orders').className = tab === 'orders' ? 'flex-1 py-2 text-sm font-medium rounded-lg bg-white text-stone-800 shadow-sm transition-all' : 'flex-1 py-2 text-sm font-medium rounded-lg text-stone-500 transition-all';
            document.getElementById('tab-settings').className = tab === 'settings' ? 'flex-1 py-2 text-sm font-medium rounded-lg bg-white text-stone-800 shadow-sm transition-all' : 'flex-1 py-2 text-sm font-medium rounded-lg text-stone-500 transition-all';
            document.getElementById('panel-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('panel-settings').classList.toggle('hidden', tab !== 'settings');
            if (tab === 'orders') renderPending();
        }

        function renderPending() {
            const el = document.getElementById('pending-list');
            if (!pendingOrders.length) {
                el.innerHTML = '<div class="text-center py-20 text-stone-400"><div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">☕</div><p>暂无待制作订单</p></div>';
                return;
            }
            el.innerHTML = pendingOrders.map((o, idx) => `
                <div class="bg-white rounded-2xl p-5 shadow-sm fade-in">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-2">
                            <span class="inline-block px-3 py-1 bg-stone-800 text-white text-sm rounded-lg font-bold">#${o.num}</span>
                            <span class="text-xs text-stone-400">${o.time}</span>
                        </div>
                        <button onclick="finishOrder(${idx})" class="px-3 py-1.5 bg-green-600 text-white text-xs rounded-lg font-medium active:scale-95 transition-transform">完成</button>
                    </div>
                    <div class="space-y-2 mb-3">
                        ${o.items.map(it => `<div class="flex justify-between text-sm"><span class="text-stone-700 font-medium">${it.emoji} ${it.name} x${it.qty}</span><span class="text-stone-400 text-xs truncate max-w-[120px]">${it.optionsText || ''}</span></div>`).join('')}
                    </div>
                    <div class="border-t border-stone-100 pt-3 flex justify-between items-center">
                        <span class="text-sm text-stone-500">共 ${o.items.reduce((s,i)=>s+(i.qty||0),0)} 件</span>
                        <span class="font-bold text-lg">¥${o.total}</span>
                    </div>
                </div>
            `).join('');
        }

        function finishOrder(idx) {
            pendingOrders.splice(idx, 1);
            savePending();
            renderPending();
        }

        function upQrcode(input, type) {
            const f = input.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 300 / img.width;
                    canvas.width = 300; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const data = canvas.toDataURL('image/jpeg', 0.6);
                    if (type === 'wechat') { configData.wechatQrcode = data; document.getElementById('p-wechat').innerHTML = `<img src="${data}" class="w-full h-full object-cover">`; }
                    else { configData.alipayQrcode = data; document.getElementById('p-alipay').innerHTML = `<img src="${data}" class="w-full h-full object-cover">`; }
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(f);
        }

        function saveSettings() {
            if (!mqttClient || !mqttClient.connected) { alert('网络未连接，请检查网络'); return; }
            configData.shopName = document.getElementById('s-name').value || '移动咖啡车';
            configData.shopNotice = document.getElementById('s-notice').value || '新鲜烘焙 · 现场制作';
            mqttClient.publish(TOPIC_PREFIX + '/config', JSON.stringify(configData), { retain: true, qos: 1 });
            alert('设置已保存，在线顾客将自动同步');
        }

        function genCarQr() {
            const url = document.getElementById('s-url').value.trim();
            if (!url) { alert('请输入顾客端链接'); return; }
            const c = document.getElementById('car-qrcode'); c.innerHTML = '';
            new QRCode(c, { text: url, width: 200, height: 200, colorDark: '#1C1917', colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.H });
            document.getElementById('car-qr-wrap').classList.remove('hidden');
        }

        // 恢复已保存的订单（防止刷新丢失）
        const saved = localStorage.getItem('coffee_pending');
        if (saved) pendingOrders = JSON.parse(saved);

        initMqtt();
        const autoUrl = location.href.replace('admin.html', 'index.html');
        document.getElementById('s-url').value = autoUrl;
    </script>
</body>
</html>
