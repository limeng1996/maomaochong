<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>咖啡车商家后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FAFAF9; color: #1C1917; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased max-w-md mx-auto min-h-screen relative bg-stone-50 shadow-2xl overflow-hidden">
    <div id="app" class="h-screen overflow-y-auto pb-6 hide-scrollbar">

        <!-- 顶部 -->
        <div class="bg-white px-6 pt-8 pb-4 sticky top-0 z-20 border-b border-stone-100">
            <h1 class="text-2xl font-bold text-stone-800 mb-4">商家后台</h1>
            <div class="flex bg-stone-100 rounded-xl p-1">
                <button onclick="switchTab('orders')" id="tab-orders" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white text-stone-800 shadow-sm transition-all">订单管理</button>
                <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-2 text-sm font-medium rounded-lg text-stone-500 transition-all">店铺设置</button>
            </div>
        </div>

        <!-- 订单页 -->
        <div id="panel-orders" class="px-4 py-6 space-y-4 fade-in">
            <div id="orders-status" class="bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-800">
                <p class="font-medium">实时同步中</p>
                <p class="text-xs mt-1">顾客下单后将自动出现在下方</p>
            </div>
            <div id="pending-list" class="space-y-3">
                <div class="text-center py-20 text-stone-400">
                    <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">☕</div>
                    <p>暂无待制作订单</p>
                </div>
            </div>
        </div>

        <!-- 设置页 -->
        <div id="panel-settings" class="hidden px-4 py-6 space-y-4 fade-in">
            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="font-bold text-stone-800">店铺信息</h3>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">店铺名称</label>
                    <input type="text" id="s-name" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-stone-200 focus:outline-none focus:border-stone-400 text-stone-800">
                </div>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">店铺公告</label>
                    <input type="text" id="s-notice" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-stone-200 focus:outline-none focus:border-stone-400 text-stone-800">
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="font-bold text-stone-800">收款码</h3>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">微信收款码</label>
                    <div class="flex items-center gap-3">
                        <div class="w-20 h-20 bg-stone-100 rounded-lg flex items-center justify-center overflow-hidden" id="p-wechat"><span class="text-xs text-stone-400">未上传</span></div>
                        <label class="flex-1 px-4 py-3 bg-stone-800 text-white rounded-xl text-center text-sm font-medium cursor-pointer active:scale-[0.98] transition-transform">
                            上传微信收款码<input type="file" accept="image/*" class="hidden" onchange="upQrcode(this,'wechat')">
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-stone-500 mb-1">支付宝收款码</label>
                    <div class="flex items-center gap-3">
                        <div class="w-20 h-20 bg-stone-100 rounded-lg flex items-center justify-center overflow-hidden" id="p-alipay"><span class="text-xs text-stone-400">未上传</span></div>
                        <label class="flex-1 px-4 py-3 bg-stone-800 text-white rounded-xl text-center text-sm font-medium cursor-pointer active:scale-[0.98] transition-transform">
                            上传支付宝收款码<input type="file" accept="image/*" class="hidden" onchange="upQrcode(this,'alipay')">
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="font-bold text-stone-800">车上点单二维码</h3>
                <p class="text-xs text-stone-500">打印此二维码贴在车上，顾客扫码进入点单页面</p>
                <input type="text" id="s-url" class="w-full px-4 py-3 bg-stone-50 rounded-xl border border-stone-200 text-stone-800 text-sm mb-3" placeholder="顾客端链接，如 https://xxx.github.io/maomaochong/index.html">
                <button onclick="genCarQr()" class="w-full py-3 bg-stone-800 text-white rounded-xl text-sm font-medium active:scale-[0.98] transition-transform">生成车上二维码</button>
                <div id="car-qr-wrap" class="hidden pt-4 border-t border-stone-100 flex flex-col items-center">
                    <div id="car-qrcode" class="mb-3"></div>
                    <p class="text-xs text-stone-500">截图保存，建议打印 10×10cm</p>
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-medium text-lg active:scale-[0.98] transition-transform">保存并广播设置</button>
        </div>
    </div>

    <script>
        // ==================== 配置：必须与顾客端完全一致 ====================
        const NTFY_TOPIC = 'coffee-limeng1996-maomaochong-orders';
        const NTFY_CONFIG_TOPIC = 'coffee-limeng1996-maomaochong-config';
        const NTFY_URL = 'https://ntfy.sh';
        // ================================================================

        let pendingOrders = [];
        let configData = { shopName: '', shopNotice: '', wechatQrcode: '', alipayQrcode: '' };
        let eventSource = null;

        function initListener() {
            // 用 SSE 实时监听新订单
            eventSource = new EventSource(`${NTFY_URL}/${NTFY_TOPIC}/sse`);
            eventSource.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.message) {
                        const order = JSON.parse(data.message);
                        if (!pendingOrders.find(o => o.timestamp === order.timestamp && o.num === order.num)) {
                            pendingOrders.unshift(order);
                            savePending();
                            renderPending();
